name: Guardian Agent Workflow

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  run-agent:
    runs-on: self-hosted
    environment: PR_GUARDIAN_KEYS
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Dynamic .env File (with Local Fallback)
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
          VARS_JSON: ${{ toJson(vars) }}
        run: |
          # Check for a persistent local fallback file
          if (Test-Path .env.local) {
              Write-Host "Found .env.local file! Using it as fallback..."
              Copy-Item -Path .env.local -Destination .env -Force
          } else {
              Write-Host "No local fallback found. Generating from GitHub Secrets..."
              New-Item -Path .env -ItemType File -Force | Out-Null
          }
          
          # Append GitHub Secrets dynamically
          $secretsObj = $env:SECRETS_JSON | ConvertFrom-Json
          if ($null -ne $secretsObj) {
            $secretsObj.psobject.properties | ForEach-Object { Add-Content -Path .env -Value "$($_.Name)=$($_.Value)" }
          }
          
          # Append GitHub Variables dynamically
          $varsObj = $env:VARS_JSON | ConvertFrom-Json
          if ($null -ne $varsObj) {
            $varsObj.psobject.properties | ForEach-Object { Add-Content -Path .env -Value "$($_.Name)=$($_.Value)" }
          }
          
          # Force mandatory GitHub context variables
          Add-Content -Path .env -Value "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"
          Add-Content -Path .env -Value "GITHUB_REPOSITORY=${{ github.repository }}"
          Add-Content -Path .env -Value "PR_NUMBER=${{ github.event.pull_request.number }}"

      - name: Create Logs Directory on Host
        run: New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\logs" | Out-Null

      - name: Run Guardian Agent
        run: |
          docker run --rm `
            --name pr-guardian-executor `
            --env-file .env `
            -e GIT_DISCOVERY_ACROSS_FILESYSTEM=1 `
            --add-host=host.docker.internal:host-gateway `
            -v "${{ github.workspace }}:/target_repo:ro" `
            -v "${{ github.workspace }}\logs:/app/guardian_agent/logs:rw" `
            -w /target_repo `
            guardian-agent `
            python -u /app/guardian_agent/main.py

      - name: Upload Agent Logs to GitHub
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-security-logs
          path: logs/

      - name: Security & Local Cleanup
        if: always()
        run: |
          if (Test-Path .env) { Remove-Item -Path .env -Force }
          if (Test-Path logs) { Remove-Item -Path logs -Recurse -Force }
